name: Staging CD (Build & Push Only)

on:
  push:
    tags:
      - 'v*-rc.*' # v1.0.0-rc.1 같은 형태의 태그가 푸시될 때만 실행

env:
  AWS_REGION: ap-northeast-2                   # 리전 (서울)
  ECR_REPOSITORY: sb08/mopl                    # AWS ECR 리포지토리 이름

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: 체크아웃
        uses: actions/checkout@v6

      - name: JDK 21 설치
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 (테스트는 CI에서 했으므로 생략)
        run: ./gradlew clean build -x test

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 도커 이미지 빌드 및 ECR에 푸시
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }} # 태그 이름(예: v1.0.0-rc.1)을 도커 이미지 태그로 사용
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # 스테이징은 ECS 배포 없이 여기서 종료됩니다.

      - name: Discord 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "스테이징(RC) 배포 결과 (${{ github.ref_name }})"
          description: |
            태그 `${{ github.ref_name }}` 기반 이미지가 ECR에 성공적으로 업로드되었습니다. (ECS 서버 배포 생략)
            by ${{ github.actor }}