spring:
  threads:
    virtual:
      enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  flyway:
    enabled: true
    locations:
      - classpath:db/migration

logging:
  level:
    root: info
    org.springframework.web.socket: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# 커스텀 프로퍼티 추가
# jwt사용을 위해 임시로 만들었습니다. 추후 삭제나 변경이 필요합니다
jwt:
  access-token:
    secret: ${JWT_ACCESS_TOKEN_SECRET}
    exp: ${JWT_ACCESS_TOKEN_EXP:900000}
  refresh-token:
    secret: ${JWT_REFRESH_TOKEN_SECRET}
    exp: ${JWT_REFRESH_TOKEN_EXP:3600000}
    cookie:
      secure: ${JWT_REFRESH_COOKIE_SECURE:true}
      same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

initAdmin:
  create:
    admin: ${INIT_ADMIN_EMAIL}
    pw: ${INIT_ADMIN_PASSWORD}