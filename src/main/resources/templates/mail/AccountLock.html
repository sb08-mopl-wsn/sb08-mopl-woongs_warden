<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>계정 상태 변경 안내</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #333333;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .header {
            padding: 32px 24px;
            background-color: #1f2937;
            color: #ffffff;
            text-align: center;
        }

        .logo {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #c7d2fe;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
        }

        .content {
            padding: 32px 28px;
            font-size: 15px;
            line-height: 1.7;
        }

        .message-box {
            margin: 28px 0;
            padding: 24px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
        }

        .message-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .message {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            line-height: 1.6;
        }

        .notice {
            margin-top: 24px;
            padding: 18px;
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            color: #1e3a8a;
            font-size: 14px;
            line-height: 1.7;
        }

        .warning {
            margin-top: 16px;
            padding: 18px;
            background-color: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            color: #7c2d12;
            font-size: 14px;
            line-height: 1.7;
        }

        .footer {
            padding: 20px 24px;
            background-color: #f9fafb;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #6b7280;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">모두의 플리 - 웅과 사는 남자</div>
        <h2>계정 상태 변경 안내</h2>
    </div>

    <div class="content">
        <p>안녕하세요, <strong>{{name}}</strong>님.</p>

        <p>
            회원님의 계정 상태가 변경되어 안내드립니다.
            아래 내용을 확인해주세요.
        </p>

        <div class="message-box">
            <div class="message-label">계정 상태 안내</div>
            <div class="message">{{meg}}</div>
        </div>

        <div class="notice">
            <strong>안내사항</strong><br>
            • 계정 정지 상태에서는 일부 서비스 이용이 제한될 수 있습니다.<br>
            • 계정 정지가 해제된 경우 다시 정상적으로 서비스를 이용할 수 있습니다.
        </div>

        <div class="warning">
            <strong>문의 안내</strong><br>
            본 조치에 대해 문의가 필요한 경우 운영자 또는 고객센터로 연락해주세요.
        </div>
    </div>

    <div class="footer">
        본 메일은 발신전용입니다.<br>
        문의사항은 고객센터로 연락해주세요.
    </div>
</div>
</body>
</html>
