<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>임시 비밀번호 안내</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #333333;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .header {
            padding: 32px 24px;
            background-color: #1f2937;
            color: #ffffff;
            text-align: center;
        }

        .logo {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #c7d2fe;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
        }

        .content {
            padding: 32px 28px;
            font-size: 15px;
            line-height: 1.7;
        }

        .password-box {
            margin: 28px 0;
            padding: 24px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
        }

        .password-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .password {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #111827;
        }

        .warning {
            margin-top: 24px;
            padding: 18px;
            background-color: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            color: #7c2d12;
            font-size: 14px;
            line-height: 1.7;
        }

        .footer {
            padding: 20px 24px;
            background-color: #f9fafb;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #6b7280;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">모두의 플리 - 웅과 사는 남자</div>
        <h2>임시 비밀번호가 발급되었습니다</h2>
    </div>

    <div class="content">
        <p>안녕하세요!</p>
        <p>
            요청하신 임시 비밀번호가 발급되었습니다.
            아래 임시 비밀번호를 사용하여 로그인 후 새로운 비밀번호로 변경해주세요.
        </p>

        <div class="password-box">
            <div class="password-label">임시 비밀번호</div>
            <div class="password">{{TEMP_PASSWORD}}</div>
        </div>

        <div class="warning">
            <strong>⚠️ 중요 안내사항</strong><br>
            • 이 임시 비밀번호는 <strong>{{EXPIRED_AT}}</strong> 까지만 유효합니다<br>
            • 로그인 후 즉시 비밀번호를 변경해주세요<br>
            • 다른 사람과 공유하지 마세요
        </div>
    </div>

    <div class="footer">
        본 메일은 발신전용입니다.<br>
        문의사항은 고객센터로 연락해주세요.
    </div>
</div>
</body>
</html>
