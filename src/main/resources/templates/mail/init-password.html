<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임시 비밀번호 안내</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color:#333333;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="background-color:#f4f6f8; margin:0; padding:0;">
    <tr>
        <td align="center" style="padding:24px 12px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600"
                   style="width:100%; max-width:600px; background-color:#ffffff; border:1px solid #e5e7eb; border-collapse:separate;">
                <tr>
                    <td align="center" style="padding:32px 24px; background-color:#1f2937; color:#ffffff;">
                        <div style="font-size:14px; font-weight:700; margin-bottom:12px; color:#c7d2fe;">모두의 플리 - 웅과 사는
                            남자
                        </div>
                        <h2 style="margin:0; font-size:22px; line-height:1.4; color:#ffffff;">임시 비밀번호가 발급되었습니다</h2>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px 28px; font-size:15px; line-height:1.7; color:#333333;">
                        <p style="margin:0 0 16px 0;">안녕하세요!</p>
                        <p style="margin:0;">
                            요청하신 임시 비밀번호가 발급되었습니다.<br>
                            아래 임시 비밀번호를 사용하여 로그인 후 새로운 비밀번호로 변경해주세요.
                        </p>

                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                               style="margin:28px 0 0 0; background-color:#f9fafb; border:1px solid #e5e7eb;">
                            <tr>
                                <td align="center" style="padding:24px;">
                                    <div style="font-size:13px; color:#6b7280; margin-bottom:10px;">임시 비밀번호</div>
                                    <div style="font-size:28px; font-weight:800; letter-spacing:2px; color:#111827;">
                                        {{TEMP_PASSWORD}}
                                    </div>
                                </td>
                            </tr>
                        </table>

                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                               style="margin-top:24px; background-color:#fff7ed; border:1px solid #fed7aa;">
                            <tr>
                                <td style="padding:18px; color:#7c2d12; font-size:14px; line-height:1.7;">
                                    <strong>중요 안내사항</strong><br>
                                    • 이 임시 비밀번호는 <strong>{{EXPIRED_AT}}</strong> 까지만 유효합니다<br>
                                    • 로그인 후 즉시 비밀번호를 변경해주세요<br>
                                    • 다른 사람과 공유하지 마세요
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td align="center"
                        style="padding:20px 24px; background-color:#f9fafb; border-top:1px solid #e5e7eb; color:#6b7280; font-size:12px; line-height:1.6;">
                        본 메일은 발신전용입니다.<br>
                        문의사항은 고객센터로 연락해주세요.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
